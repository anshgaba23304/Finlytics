# Production — REQUIRED in Render (Environment):
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD,
#   APP_JWT_SECRET (long random string, not the dev default).
#
# "Network unreachable" → use Session pooler URL from Supabase (see env.supabase.example).

# Render / Docker
server.address=0.0.0.0
server.port=${PORT:8080}

# Datasource (must be set via env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — relax timeout for slow cloud connections
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# Hibernate — explicit dialect (avoids "Unable to determine Dialect" when DB unreachable at metadata phase)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.jakarta.persistence.create-database-schemas=true

# Disable Swagger in prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Seed off
app.seed.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
