services:
  postgres:
    image: postgres:16-alpine
    container_name: finlytics-postgres
    environment:
      POSTGRES_DB: finlytics
      POSTGRES_USER: finlytics
      POSTGRES_PASSWORD: finlytics
    ports:
      - "5432:5432"
    volumes:
      - finlytics_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finlytics -d finlytics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  finlytics_pgdata:
