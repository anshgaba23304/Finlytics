spring.application.name=Finlytics
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# PaaS (Render, etc.) inject PORT; Dockerfile also passes -Dserver.port
server.port=${PORT:8080}

# Optional overrides (gitignored): copy application-local.properties.example → application-local.properties
spring.config.import=optional:classpath:application-local.properties

# Database — no real URLs or passwords in git. Use SPRING_DATASOURCE_* env vars or application-local.properties.
# Defaults match docker-compose.yml (local Postgres). For Supabase, set env vars (see env.supabase.example).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finlytics}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finlytics}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finlytics}

# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.jakarta.persistence.create-database-schemas=true

# JWT — set APP_JWT_SECRET in production (>= 32 bytes for HS256)
app.security.jwt.secret=${APP_JWT_SECRET:ChangeThisToAVeryLongSecretKeyForHS256AlgorithmMinimum256BitsRequiredForProductionUseOnly}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Demo seed users + sample records (disable in prod via profile or APP_SEED_ENABLED=false)
app.seed.enabled=${APP_SEED_ENABLED:true}

# OpenAPI paths (Swagger toggled per profile)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Actuator (exposure completed per profile)
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
