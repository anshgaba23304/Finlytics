# Production — REQUIRED in Render (Environment): SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
# SPRING_DATASOURCE_PASSWORD, APP_JWT_SECRET (long random string, not the dev default).

# Render / Docker
server.address=0.0.0.0
server.port=${PORT:8080}

# Datasource (no defaults — must be set on the host)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA: same values as datasource — Hibernate 7 reads these for bootstrap when JDBC metadata is unavailable
spring.jpa.properties.jakarta.persistence.jdbc.url=${SPRING_DATASOURCE_URL}
spring.jpa.properties.jakarta.persistence.jdbc.user=${SPRING_DATASOURCE_USERNAME}
spring.jpa.properties.jakarta.persistence.jdbc.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.properties.jakarta.persistence.jdbc.driver=org.postgresql.Driver

# Hibernate 7 — explicit PostgreSQL dialect (required if JDBC URL is not visible to Hibernate during EMF bootstrap)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.jakarta.persistence.create-database-schemas=true

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

app.seed.enabled=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
